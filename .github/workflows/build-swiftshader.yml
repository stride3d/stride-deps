name: Build SwiftShader

on:
  workflow_dispatch:

jobs:
  build:
    name: Build SwiftShader (Windows x64)
    runs-on: windows-2025-vs2026
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout SwiftShader
        uses: actions/checkout@v4
        with:
          repository: google/swiftshader
          submodules: recursive
          path: swiftshader-src

      - name: Build
        shell: pwsh
        run: |
          cmake -S swiftshader-src -B swiftshader-build -Thost=x64 -DSWIFTSHADER_BUILD_TESTS=OFF -DSWIFTSHADER_BUILD_BENCHMARKS=OFF
          cmake --build swiftshader-build --config Release --target vk_swiftshader

      - name: Commit binaries
        shell: pwsh
        run: |
          $commitHash = git -C swiftshader-src rev-parse HEAD
          $commitDate = git -C swiftshader-src log -1 --format=%ci
          New-Item -ItemType Directory -Force -Path swiftshader | Out-Null
          Copy-Item swiftshader-build/Windows/vk_swiftshader.dll swiftshader/
          Copy-Item swiftshader-build/Windows/vk_swiftshader_icd.json swiftshader/
          Set-Content -Path swiftshader/VERSION.txt -Value "source: google/swiftshader`ncommit: $commitHash`ndate: $commitDate"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add swiftshader/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update SwiftShader binaries (google/swiftshader@$($commitHash.Substring(0,10)))"
          git push
